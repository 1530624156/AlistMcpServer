<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alist 配置初始化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8faf9;
            --bg-card: #ffffff;
            --text-primary: #1a2e1a;
            --text-secondary: #5a6b5a;
            --text-muted: #8fa08f;
            --accent: #4a7c59;
            --accent-light: #6ba37a;
            --accent-glow: rgba(74, 124, 89, 0.15);
            --border: #e2ebe2;
            --input-bg: #f4f8f4;
            --success: #4a7c59;
            --error: #c75d5d;
            --info: #5a8fd4;
            --shadow-soft: 0 4px 24px rgba(74, 124, 89, 0.08);
            --shadow-hover: 0 8px 40px rgba(74, 124, 89, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle geometric background pattern */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(74, 124, 89, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(107, 163, 122, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px var(--accent-glow);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .logo-wrapper svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.15s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.35s; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
            transition: fill 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-primary);
            background: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .form-group input:focus {
            background: var(--bg-card);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .form-group input:focus + svg,
        .input-wrapper:has(input:focus) svg {
            fill: var(--accent);
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 32px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.5s ease-out 0.45s forwards;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(74, 124, 89, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        .submit-btn.loading .btn-text span {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Message toast */
        .message {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .message.success {
            background: var(--success);
        }

        .message.error {
            background: var(--error);
        }

        .message.info {
            background: var(--info);
        }

        /* Decorative elements */
        .decoration {
            position: fixed;
            pointer-events: none;
            opacity: 0.4;
        }

        .decoration-1 {
            top: 15%;
            right: 10%;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2.5s ease-in-out infinite;
        }

        .decoration-2 {
            bottom: 20%;
            left: 8%;
            width: 6px;
            height: 6px;
            background: var(--accent-light);
            border-radius: 50%;
            animation: pulse 2.5s ease-in-out 0.5s infinite;
        }

        .decoration-3 {
            top: 40%;
            left: 5%;
            width: 4px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: pulse 2.5s ease-in-out 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <!-- Decorative dots -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>

    <!-- Toast message -->
    <div class="message" id="message"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                </div>
                <h1 class="title">Alist 配置</h1>
                <p class="subtitle">初始化您的 Alist 连接信息</p>
            </div>

            <form id="initForm">
                <div class="form-group">
                    <label>服务地址</label>
                    <div class="input-wrapper">
                        <input type="url" name="url" id="url" placeholder="https://your-alist.example.com" required>
                        <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                    </div>
                </div>

                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" id="username" placeholder="输入用户名" required>
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="输入密码" required>
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">
                        <span>初始化配置</span>
                    </span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('initForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 4000);
        }

        // Check Alist status on page load
        (async function checkStatus() {
            try {
                const response = await fetch('/alist/status');
                const data = await response.json();
                if (data.initialized) {
                    showMessage('Alist 已配置，如需重新配置请填写新信息后提交', 'info');
                } else if (data.message) {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                // Silently ignore status check errors
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = document.getElementById('url').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!url || !username || !password) {
                showMessage('请填写所有字段', 'error');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/alist/init', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, username, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message || '初始化成功', 'success');
                    form.reset();
                } else {
                    showMessage(data.message || '初始化失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
